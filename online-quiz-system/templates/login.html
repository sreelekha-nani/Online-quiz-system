<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QuizMaster</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <a href="{{ url_for('index') }}" class="navbar-brand">🚀 QuizMaster</a>
        <ul class="nav-links">
            <li><a href="{{ url_for('index') }}">Home</a></li>
            <li><a href="{{ url_for('leaderboard') }}">Leaderboard</a></li>
            <li><a href="{{ url_for('register') }}" class="nav-btn">Register</a></li>
        </ul>
    </nav>

    <div class="main-content">
        <div class="card">
            <h1>Student Login</h1>
            <p class="subtitle">Please login to start your challenge.</p>
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="flash-msg">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="{{ url_for('login') }}" method="POST">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Your password">
                </div>
                <button type="submit" class="btn btn-primary">Login Now</button>
            </form>

            <p style="margin-top: 25px; color: var(--text-muted);">New here? <a href="{{ url_for('register') }}" style="color: #667eea; font-weight: 700;">Create account</a></p>
            <a href="{{ url_for('index') }}" class="back-home">Back to Home</a>
        </div>
    </div>
</body>
</html>
