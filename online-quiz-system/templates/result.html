<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Result - QuizMaster</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <a href="{{ url_for('index') }}" class="navbar-brand">🚀 QuizMaster</a>
        <ul class="nav-links">
            <li><a href="{{ url_for('index') }}">Home</a></li>
            <li><a href="{{ url_for('leaderboard') }}">Leaderboard</a></li>
            <li><a href="{{ url_for('logout') }}" class="nav-btn">Sign Out</a></li>
        </ul>
    </nav>

    <div class="main-content">
        <div class="card">
            <div style="font-size: 5rem; margin-bottom: 20px;">🏆</div>
            <h1>Great Job, {{ name }}!</h1>
            <p class="subtitle">You've successfully completed the quiz challenge.</p>
            
            <div style="background: #f8f9fa; padding: 40px; border-radius: 20px; border: 2px dashed #eee; margin-bottom: 30px;">
                <p style="text-transform: uppercase; font-size: 0.9rem; letter-spacing: 2px; font-weight: 700; color: var(--text-muted); margin-bottom: 10px;">Your Final Score</p>
                <div style="font-size: 4rem; font-weight: 800; color: #1cc88a; line-height: 1;">
                    {{ score }}<span style="font-size: 1.5rem; color: var(--text-muted); font-weight: 500;">/{{ total }}</span>
                </div>
                {% if total > 0 %}
                <p style="margin-top: 15px; font-weight: 600; color: #4e73df;">Accuracy: {{ (score/total*100)|round(1) }}%</p>
                {% endif %}
            </div>

            <div style="display: flex; gap: 15px;">
                <a href="{{ url_for('start_quiz') }}" class="btn btn-success" style="flex: 1;">Try Again</a>
                <a href="{{ url_for('leaderboard') }}" class="btn btn-primary" style="flex: 1;">Leaderboard</a>
            </div>

            <a href="{{ url_for('index') }}" class="back-home">Return to Home</a>
        </div>
    </div>
</body>
</html>
