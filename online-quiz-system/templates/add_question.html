<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Question - QuizMaster</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <a href="{{ url_for('index') }}" class="navbar-brand">🚀 QuizMaster Admin</a>
        <ul class="nav-links">
            <li><a href="{{ url_for('index') }}">Home</a></li>
            <li><a href="{{ url_for('admin_dashboard') }}">Dashboard</a></li>
            <li><a href="{{ url_for('logout') }}" class="nav-btn">Logout</a></li>
        </ul>
    </nav>

    <div class="main-content">
        <div class="card">
            <h1>Create Question</h1>
            <p class="subtitle">Enter the question details below.</p>
            
            <form action="{{ url_for('add_question') }}" method="POST">
                <div class="form-group">
                    <label for="text">Question Prompt</label>
                    <textarea id="text" name="text" required rows="3" placeholder="Enter question text here..."></textarea>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label for="option1">Option 1</label>
                        <input type="text" id="option1" name="option1" required placeholder="First option">
                    </div>
                    <div class="form-group">
                        <label for="option2">Option 2</label>
                        <input type="text" id="option2" name="option2" required placeholder="Second option">
                    </div>
                    <div class="form-group">
                        <label for="option3">Option 3</label>
                        <input type="text" id="option3" name="option3" required placeholder="Third option">
                    </div>
                    <div class="form-group">
                        <label for="option4">Option 4</label>
                        <input type="text" id="option4" name="option4" required placeholder="Fourth option">
                    </div>
                </div>
                <div class="form-group">
                    <label for="correct_option">Correct Option Number (1-4)</label>
                    <select id="correct_option" name="correct_option" required>
                        <option value="" disabled selected>Select the correct option</option>
                        <option value="1">Option 1</option>
                        <option value="2">Option 2</option>
                        <option value="3">Option 3</option>
                        <option value="4">Option 4</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Add Question Now</button>
            </form>

            <a href="{{ url_for('admin_dashboard') }}" class="back-home">Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
