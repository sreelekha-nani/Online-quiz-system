<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Register - QuizMaster</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <a href="{{ url_for('index') }}" class="navbar-brand">🚀 QuizMaster Admin</a>
    </nav>

    <div class="main-content">
        <div class="card">
            <h1>Admin Registration</h1>
            <p class="subtitle">Create a new administrator account.</p>
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="flash-msg">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="{{ url_for('admin_register') }}" method="POST">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="Admin Name">
                </div>
                <div class="form-group">
                    <label for="email">Admin Email</label>
                    <input type="email" id="email" name="email" required placeholder="admin@quiz.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-secondary" style="background: #2d3436;">Register Admin</button>
            </form>

            <p style="margin-top: 25px; color: var(--text-muted);">Already an admin? <a href="{{ url_for('admin_login') }}" style="color: #667eea; font-weight: 700;">Login here</a></p>
            <a href="{{ url_for('index') }}" class="back-home">Back to Home</a>
        </div>
    </div>
</body>
</html>
